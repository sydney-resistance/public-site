name: Test

# Runs only when a maintainer adds the `safe-to-test` label to a PR. Each new
# commit clears the label automatically, so the maintainer must re-review and
# re-label before tests run again. This prevents arbitrary contributor code
# from consuming CI minutes until a maintainer has eyeballed the diff.
on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unlabel-on-sync:
    # When the contributor pushes new commits, strip the label so the
    # maintainer has to re-approve the new code before tests run.
    if: github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Remove safe-to-test label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'safe-to-test'
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

  htmlproofer:
    if: github.event.action == 'labeled' && github.event.label.name == 'safe-to-test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Build site
        run: bundle exec jekyll build
      - name: HTMLProofer
        run: |
          bundle exec htmlproofer ./_site \
            --disable-external=true \
            --allow-missing-href=true \
            --ignore-missing-alt=true
